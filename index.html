<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOF 基金实时行情</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>LOF 基金实时行情</h1>
        </header>
        
        <div class="controls">
            <input type="text" id="searchInput" placeholder="搜索基金代码或名称...">
            <span id="totalCount">共 0 只基金</span>
            <span id="lastUpdate"></span>
        </div>
        
        <table id="fundTable">
            <thead>
                <tr>
                    <th>基金信息</th>
                    <th>溢价率</th>
                    <th>限购值</th>
                </tr>
            </thead>
            <tbody id="fundTableBody">
                <!-- 数据将通过 JavaScript 动态填充 -->
            </tbody>
        </table>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
